services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: launchguard-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://launchguard:launchguard@postgres:5432/launchguard?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: launchguard-local-jwt-secret
    depends_on:
      - postgres
      - redis
      - kafka

  postgres:
    image: postgres:16-alpine
    container_name: launchguard-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: launchguard
      POSTGRES_PASSWORD: launchguard
      POSTGRES_DB: launchguard
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: launchguard-redis
    ports:
      - "6380:6379"

  kafka:
    image: apache/kafka:latest
    container_name: launchguard-kafka
    ports:
      - "9092:9092"

  kafka-init:
    image: apache/kafka:latest
    container_name: launchguard-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      sleep 10 &&
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server kafka:9092
      --create
      --if-not-exists
      --topic feature_flag_evaluations
      --partitions 1
      --replication-factor 1
      "

volumes:
  postgres_data: