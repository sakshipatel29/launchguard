services:
  postgres:
    image: postgres:16-alpine
    container_name: launchguard-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: launchguard
      POSTGRES_PASSWORD: launchguard
      POSTGRES_DB: launchguard
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: launchguard-redis
    ports:
      - "6380:6379"

  kafka:
    image: apache/kafka:latest
    container_name: launchguard-kafka
    ports:
      - "9092:9092"

volumes:
  postgres_data: